<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Todo Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

.task-completed { text-decoration: line-through; opacity: 0.5; }

.glow {
  box-shadow: 0 0 18px rgba(34,211,238,0.25),
              0 0 35px rgba(168,85,247,0.25);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4
bg-gradient-to-br from-slate-950 via-purple-950 to-slate-900">

<div class="w-full max-w-3xl rounded-3xl p-6
bg-white/5 backdrop-blur-2xl border border-white/10">

<!-- Header -->
<div class="text-center mb-5">
  <h1 class="text-4xl font-extrabold text-transparent bg-clip-text
  bg-gradient-to-r from-cyan-300 via-purple-300 to-fuchsia-300">
    ⚡ Modern Todo Application Pro
  </h1>
</div>

<!-- INPUT ROW -->
<div class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-4">

  <input id="taskInput" placeholder="Task..."
  class="md:col-span-2 px-3 py-2 rounded-lg bg-slate-900/60 text-white border border-white/10">

  <input id="dateInput" type="date"
  class="px-3 py-2 rounded-lg bg-slate-900/60 text-white border border-white/10">

  <select id="priorityInput"
  class="px-3 py-2 rounded-lg bg-slate-900/60 text-white border border-white/10">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <button id="addBtn"
  class="glow bg-gradient-to-r from-cyan-500 to-fuchsia-600 text-white rounded-lg">
    Add
  </button>

</div>

<!-- SEARCH + SORT -->
<div class="flex flex-col md:flex-row gap-2 mb-4">

  <input id="searchInput" placeholder="Search tasks..."
  class="flex-1 px-3 py-2 rounded-lg bg-slate-900/60 text-white border border-white/10">

  <select id="sortInput"
  class="px-3 py-2 rounded-lg bg-slate-900/60 text-white border border-white/10">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="priority">Priority</option>
  </select>

</div>

<!-- FILTERS -->
<div class="flex gap-2 mb-4">
  <button class="filter bg-cyan-500 px-3 py-1 rounded" data="all">All</button>
  <button class="filter bg-white/10 px-3 py-1 rounded" data="active">Active</button>
  <button class="filter bg-white/10 px-3 py-1 rounded" data="done">Done</button>
</div>

<!-- STATS -->
<div class="flex justify-between text-sm text-slate-300 mb-3">
  <span id="stats">0 tasks</span>
  <button id="clearDone" class="text-pink-400">Clear Done</button>
</div>

<!-- LIST -->
<div id="list" class="space-y-2 max-h-[420px] overflow-y-auto"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("todos")) || [];
let filter = "all";

const el = id => document.getElementById(id);

function save() {
  localStorage.setItem("todos", JSON.stringify(tasks));
}

function addTask() {
  if (!el("taskInput").value.trim()) return;

  tasks.unshift({
    id: Date.now(),
    text: el("taskInput").value,
    date: el("dateInput").value,
    priority: el("priorityInput").value,
    done: false,
    pinned: false
  });

  el("taskInput").value = "";
  render();
}

function toggle(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  render();
}

function del(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function pin(id) {
  tasks = tasks.map(t => t.id === id ? {...t, pinned: !t.pinned} : t);
  render();
}

function edit(id, value) {
  tasks = tasks.map(t => t.id === id ? {...t, text: value} : t);
  render();
}

function render() {

  let list = [...tasks];

  const search = el("searchInput").value.toLowerCase();

  if (search)
    list = list.filter(t => t.text.toLowerCase().includes(search));

  if (filter === "active") list = list.filter(t => !t.done);
  if (filter === "done") list = list.filter(t => t.done);

  const sort = el("sortInput").value;

  if (sort === "newest") list.sort((a,b)=>b.id-a.id);
  if (sort === "oldest") list.sort((a,b)=>a.id-b.id);
  if (sort === "priority") {
    const p = {high:3, medium:2, low:1};
    list.sort((a,b)=>p[b.priority]-p[a.priority]);
  }

  list.sort((a,b)=>b.pinned - a.pinned);

  el("list").innerHTML = list.map(t => `
    <div class="p-3 rounded-lg bg-slate-900/60 border border-white/10">

      <div class="flex justify-between items-center">

        <div class="flex gap-2 items-center flex-1">

          <input type="checkbox" ${t.done ? "checked":""}
          onchange="toggle(${t.id})" class="accent-cyan-400">

          <input value="${t.text}"
          onblur="edit(${t.id}, this.value)"
          class="bg-transparent text-white w-full outline-none ${t.done?'task-completed':''}">
        </div>

        <div class="flex gap-2">

          <button onclick="pin(${t.id})"
          class="text-xs px-2 py-1 rounded bg-purple-600">
            📌
          </button>

          <button onclick="del(${t.id})"
          class="text-xs px-2 py-1 rounded bg-pink-600">
            ✖
          </button>

        </div>
      </div>

      <div class="text-xs text-slate-400 mt-1 flex justify-between">
        <span>📅 ${t.date || "No date"}</span>
        <span>⚡ ${t.priority}</span>
      </div>

    </div>
  `).join("");

  el("stats").innerText = `${tasks.filter(t=>!t.done).length} active / ${tasks.length} total`;
  save();
}

document.getElementById("addBtn").onclick = addTask;
document.getElementById("searchInput").oninput = render;
document.getElementById("sortInput").onchange = render;

document.getElementById("clearDone").onclick = () => {
  tasks = tasks.filter(t => !t.done);
  render();
};

document.querySelectorAll(".filter").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll(".filter").forEach(x=>x.className="filter bg-white/10 px-3 py-1 rounded");
    b.className="filter bg-cyan-500 px-3 py-1 rounded";
    filter = b.getAttribute("data");
    render();
  }
});

render();
</script>

</body>
</html>
