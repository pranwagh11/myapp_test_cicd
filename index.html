<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Todo App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-thumb {
    background: #4b5563;
    border-radius: 10px;
}
.task-completed {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>
</head>

<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-slate-900 rounded-2xl shadow-2xl p-6">

    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-white">📝 Todo App</h1>
        <p class="text-slate-400 mt-2">Stay organized and productive</p>
    </div>

    <!-- Input -->
    <div class="flex gap-2 mb-6">
        <input
            id="taskInput"
            type="text"
            placeholder="Enter a task..."
            class="flex-1 bg-slate-800 text-white px-4 py-3 rounded-xl outline-none border border-slate-700 focus:border-blue-500"
        />

        <button
            id="addBtn"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition">
            Add
        </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap justify-center gap-2 mb-6">
        <button class="filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg" data-filter="all">
            All
        </button>

        <button class="filter-btn bg-slate-800 text-slate-300 px-4 py-2 rounded-lg" data-filter="active">
            Active
        </button>

        <button class="filter-btn bg-slate-800 text-slate-300 px-4 py-2 rounded-lg" data-filter="completed">
            Completed
        </button>
    </div>

    <!-- Stats -->
    <div class="flex justify-between text-sm text-slate-400 mb-4">
        <span id="taskCount">0 tasks</span>
        <button id="clearCompleted" class="text-red-400 hover:text-red-300">
            Clear Completed
        </button>
    </div>

    <!-- Task List -->
    <div id="taskList" class="space-y-3 max-h-[400px] overflow-y-auto"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("todos")) || [];
let currentFilter = "all";

const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");
const taskCount = document.getElementById("taskCount");
const addBtn = document.getElementById("addBtn");
const clearCompleted = document.getElementById("clearCompleted");

function saveTasks() {
    localStorage.setItem("todos", JSON.stringify(tasks));
}

function updateCount() {
    const activeTasks = tasks.filter(task => !task.completed).length;
    taskCount.textContent =
        `${activeTasks} active task${activeTasks !== 1 ? "s" : ""}`;
}

function renderTasks() {

    taskList.innerHTML = "";

    let filteredTasks = tasks;

    if (currentFilter === "active") {
        filteredTasks = tasks.filter(t => !t.completed);
    }

    if (currentFilter === "completed") {
        filteredTasks = tasks.filter(t => t.completed);
    }

    if (filteredTasks.length === 0) {
        taskList.innerHTML = `
            <div class="text-center text-slate-500 py-8">
                No tasks found
            </div>
        `;
    }

    filteredTasks.forEach(task => {

        const div = document.createElement("div");

        div.className =
            "bg-slate-800 p-4 rounded-xl flex items-center justify-between gap-3";

        div.innerHTML = `
            <div class="flex items-center gap-3 flex-1">

                <input
                    type="checkbox"
                    ${task.completed ? "checked" : ""}
                    onchange="toggleTask(${task.id})"
                    class="w-5 h-5 accent-blue-500"
                >

                <span class="text-white break-all flex-1 ${
                    task.completed ? "task-completed" : ""
                }">
                    ${escapeHtml(task.text)}
                </span>
            </div>

            <div class="flex gap-2">
                <button
                    onclick="editTask(${task.id})"
                    class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1 rounded-lg">
                    Edit
                </button>

                <button
                    onclick="deleteTask(${task.id})"
                    class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg">
                    Delete
                </button>
            </div>
        `;

        taskList.appendChild(div);
    });

    updateCount();
    saveTasks();
}

function addTask() {

    const text = taskInput.value.trim();

    if (!text) return;

    tasks.unshift({
        id: Date.now(),
        text,
        completed: false
    });

    taskInput.value = "";
    renderTasks();
}

function toggleTask(id) {

    tasks = tasks.map(task =>
        task.id === id
            ? { ...task, completed: !task.completed }
            : task
    );

    renderTasks();
}

function deleteTask(id) {

    tasks = tasks.filter(task => task.id !== id);
    renderTasks();
}

function editTask(id) {

    const task = tasks.find(t => t.id === id);

    const newText = prompt("Edit task:", task.text);

    if (newText === null) return;

    const trimmed = newText.trim();

    if (!trimmed) return;

    task.text = trimmed;

    renderTasks();
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

clearCompleted.addEventListener("click", () => {
    tasks = tasks.filter(task => !task.completed);
    renderTasks();
});

addBtn.addEventListener("click", addTask);

taskInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") addTask();
});

document.querySelectorAll(".filter-btn").forEach(btn => {

    btn.addEventListener("click", () => {

        document.querySelectorAll(".filter-btn").forEach(b => {
            b.classList.remove("bg-blue-600", "text-white");
            b.classList.add("bg-slate-800", "text-slate-300");
        });

        btn.classList.remove("bg-slate-800", "text-slate-300");
        btn.classList.add("bg-blue-600", "text-white");

        currentFilter = btn.dataset.filter;

        renderTasks();
    });
});

renderTasks();
</script>

</body>
</html>
