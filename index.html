<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Neon Todo</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-thumb {
    background: #22d3ee;
    border-radius: 10px;
}

.task-completed {
    text-decoration: line-through;
    opacity: 0.5;
}

.glow {
    box-shadow: 0 0 18px rgba(34,211,238,0.25),
                0 0 35px rgba(168,85,247,0.25);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 
bg-gradient-to-br from-slate-950 via-purple-950 to-slate-900">

<div class="w-full max-w-2xl rounded-3xl p-6
bg-white/5 backdrop-blur-2xl border border-white/10 shadow-2xl">

    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold bg-gradient-to-r 
        from-cyan-300 via-purple-300 to-fuchsia-300 bg-clip-text text-transparent">
            🧠 Neon Todo
        </h1>
        <p class="text-slate-300 mt-2">Clean focus. Modern vibes.</p>
    </div>

    <!-- Input -->
    <div class="flex gap-2 mb-6">
        <input
            id="taskInput"
            type="text"
            placeholder="Write your task..."
            class="flex-1 px-4 py-3 rounded-xl outline-none
            bg-slate-900/60 text-white border border-white/10
            focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/30"
        />

        <button
            id="addBtn"
            class="glow px-6 py-3 rounded-xl font-semibold text-white
            bg-gradient-to-r from-cyan-500 via-purple-600 to-fuchsia-600
            hover:scale-105 transition-all duration-300">
            Add
        </button>
    </div>

    <!-- Filters -->
    <div class="flex justify-center gap-2 mb-6">
        <button class="filter-btn px-4 py-2 rounded-lg
        bg-cyan-500 text-white" data-filter="all">
            All
        </button>

        <button class="filter-btn px-4 py-2 rounded-lg
        bg-white/10 text-slate-200 hover:bg-white/20" data-filter="active">
            Active
        </button>

        <button class="filter-btn px-4 py-2 rounded-lg
        bg-white/10 text-slate-200 hover:bg-white/20" data-filter="completed">
            Completed
        </button>
    </div>

    <!-- Stats -->
    <div class="flex justify-between text-sm text-slate-300 mb-4">
        <span id="taskCount">0 tasks</span>
        <button id="clearCompleted" class="text-pink-400 hover:text-pink-300">
            Clear Completed
        </button>
    </div>

    <!-- Tasks -->
    <div id="taskList" class="space-y-3 max-h-[420px] overflow-y-auto"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("todos")) || [];
let currentFilter = "all";

const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");
const taskCount = document.getElementById("taskCount");
const addBtn = document.getElementById("addBtn");
const clearCompleted = document.getElementById("clearCompleted");

function saveTasks() {
    localStorage.setItem("todos", JSON.stringify(tasks));
}

function updateCount() {
    const active = tasks.filter(t => !t.completed).length;
    taskCount.textContent = `${active} active task${active !== 1 ? "s" : ""}`;
}

function renderTasks() {
    taskList.innerHTML = "";

    let filtered = tasks;

    if (currentFilter === "active") {
        filtered = tasks.filter(t => !t.completed);
    } else if (currentFilter === "completed") {
        filtered = tasks.filter(t => t.completed);
    }

    if (filtered.length === 0) {
        taskList.innerHTML = `
            <div class="text-center text-slate-400 py-8">
                No tasks found
            </div>`;
    }

    filtered.forEach(task => {
        const div = document.createElement("div");

        div.className =
        "flex items-center justify-between gap-3 p-4 rounded-xl " +
        "bg-slate-900/60 border border-white/10 backdrop-blur-md";

        div.innerHTML = `
            <div class="flex items-center gap-3 flex-1">

                <input type="checkbox"
                    ${task.completed ? "checked" : ""}
                    onchange="toggleTask(${task.id})"
                    class="w-5 h-5 accent-cyan-400"
                />

                <span class="text-slate-100 break-all flex-1 ${
                    task.completed ? "task-completed" : ""
                }">
                    ${escapeHtml(task.text)}
                </span>
            </div>

            <div class="flex gap-2">
                <button onclick="editTask(${task.id})"
                    class="px-3 py-1 rounded-lg text-black font-medium
                    bg-cyan-300 hover:bg-cyan-200">
                    Edit
                </button>

                <button onclick="deleteTask(${task.id})"
                    class="px-3 py-1 rounded-lg text-white
                    bg-pink-600 hover:bg-pink-500">
                    Delete
                </button>
            </div>
        `;

        taskList.appendChild(div);
    });

    updateCount();
    saveTasks();
}

function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;

    tasks.unshift({
        id: Date.now(),
        text,
        completed: false
    });

    taskInput.value = "";
    renderTasks();
}

function toggleTask(id) {
    tasks = tasks.map(t =>
        t.id === id ? { ...t, completed: !t.completed } : t
    );
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
}

function editTask(id) {
    const task = tasks.find(t => t.id === id);
    const updated = prompt("Edit task:", task.text);

    if (!updated) return;
    task.text = updated.trim();
    renderTasks();
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

addBtn.onclick = addTask;
taskInput.addEventListener("keypress", e => {
    if (e.key === "Enter") addTask();
});

clearCompleted.onclick = () => {
    tasks = tasks.filter(t => !t.completed);
    renderTasks();
};

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".filter-btn").forEach(b => {
            b.className =
            "filter-btn px-4 py-2 rounded-lg bg-white/10 text-slate-200 hover:bg-white/20";
        });

        btn.className =
        "filter-btn px-4 py-2 rounded-lg bg-cyan-500 text-white";

        currentFilter = btn.dataset.filter;
        renderTasks();
    };
});

renderTasks();
</script>

</body>
</html>
